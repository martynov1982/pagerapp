<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAGER — Доступ открывается на глазах</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/@splinetool/viewer@latest/build/spline-viewer.js"></script>
<style>
  :root{
    --bg: #060608;
    --glow: #20C997;
    --glow-2: #1AA37D;
    --text: #F2F3F4;
    --text-dim: rgba(242,243,244,0.62);
    --text-faint: rgba(242,243,244,0.36);
    --line: rgba(242,243,244,0.12);

    --personal: #20C997;
    --work: #38BDF8;
    --guest: #D4C4B7;
    --alter: #FFCE7A;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0; background: var(--bg); color: var(--text);
    font-family:'Plus Jakarta Sans',system-ui,sans-serif; -webkit-font-smoothing: antialiased;
    height: 100vh; overflow: hidden;
  }
  .mono{ font-family:'IBM Plex Mono',monospace; letter-spacing:0.05em; }

  .stage-wrap{
    position: relative; width: 100%; height: 100vh;
    display:flex; align-items:center; justify-content:center;
    perspective: 1400px;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(32,201,151,0.10), transparent 55%),
      var(--bg);
  }

  .grid-tunnel{
    position:absolute; inset:0; z-index: 40; pointer-events:none;
    opacity: 0;
    background-image:
      linear-gradient(rgba(32,201,151,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(32,201,151,0.18) 1px, transparent 1px);
    background-size: 60px 60px;
    transform: perspective(600px) rotateX(60deg) scale(1) translateZ(0);
    transform-origin: 50% 50%;
    transition: opacity 0.25s ease;
  }
  .grid-tunnel.active{
    opacity: 1;
    animation: tunnelZoom 0.65s cubic-bezier(.5,0,.7,1) forwards;
  }
  @keyframes tunnelZoom{
    0%{ transform: perspective(600px) rotateX(60deg) scale(1) translateZ(0); opacity: 0.9; }
    100%{ transform: perspective(600px) rotateX(60deg) scale(3.2) translateZ(400px); opacity: 0; }
  }

  .stage{
    position: relative;
    transition: transform 0.9s cubic-bezier(.16,1,.3,1);
    transform: scale(1) translateY(0);
  }
  .stage.pushed{ transform: scale(1.16) translateY(-14px); }
  .stage.resting{ transform: scale(1) translateY(0); }

  .capsule{
    position:absolute; top: -46px; left:50%; transform: translateX(-50%);
    display:flex; align-items:center; gap: 8px;
    background: rgba(20,20,22,0.9); border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 8px 16px; border-radius: 999px; white-space: nowrap;
    z-index: 30; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .capsule .dot{
    width: 7px; height: 7px; border-radius: 50%; background: var(--glow);
    box-shadow: 0 0 8px var(--glow);
    animation: dotPulse 1.2s ease-in-out infinite;
  }
  @keyframes dotPulse{ 0%,100%{ opacity: 0.4; } 50%{ opacity: 1; } }
  .capsule span{ font-family:'IBM Plex Mono',monospace; font-size: 11.5px; color: rgba(255,255,255,0.85); transition: opacity 0.2s ease; }

  .float-anim{ animation: floatY 4.2s ease-in-out infinite; }
  @keyframes floatY{ 0%,100%{ transform: translateY(0); } 50%{ transform: translateY(-10px); } }

  .phone-outer{ position: relative; width: 460px; height: 560px; }

  .spline-box{
    position:absolute; inset:0; z-index: 1;
    border-radius: 24px; overflow: hidden;
  }
  .spline-box spline-viewer{ width:100%; height:100%; display:block; }

  .bubbles{
    position:absolute; top: 8%; left:50%; transform: translateX(-50%);
    width: 220px; z-index: 15;
  }
  .bubble-in{ background: rgba(32,201,151,0.14); border: 1px solid rgba(32,201,151,0.25); backdrop-filter: blur(6px); color:#fff; font-size: 11.5px; padding: 8px 12px; border-radius: 12px 12px 12px 3px; margin-bottom: 8px; max-width: 100%; }
  .bubble-out{ background: rgba(20,20,22,0.7); border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(6px); color:#fff; font-size: 11.5px; padding: 8px 12px; border-radius: 12px 12px 3px 12px; margin-bottom: 8px; max-width: 100%; margin-left: auto; }

  .sheet{
    position:absolute; left: 50%; bottom: 4%; transform: translateX(-50%) translateY(120%);
    width: 260px;
    background: rgba(22,23,26,0.88); border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);
    border-radius: 20px;
    padding: 18px 16px 20px;
    transition: transform 0.7s cubic-bezier(.16,1,.3,1);
    z-index: 20;
    box-shadow: 0 24px 50px -12px rgba(0,0,0,0.6);
  }
  .sheet.up{ transform: translateX(-50%) translateY(0); }
  .sheet-handle{ width: 34px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.2); margin: 0 auto 14px; }
  .sheet-top{ display:flex; align-items:center; gap: 10px; margin-bottom: 14px; }
  .sheet-avatar{ width: 36px; height: 36px; border-radius: 9px; background: var(--personal); }
  .sheet-name{ color:#fff; font-size: 13.5px; font-weight: 700; }
  .sheet-id{ font-family:'IBM Plex Mono',monospace; font-size: 10px; color: rgba(255,255,255,0.4); }

  .sheet-perms{ display:flex; flex-direction:column; gap: 7px; }
  .sheet-perm{ display:flex; justify-content:space-between; align-items:center; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; padding: 9px 11px; font-size: 11.5px; color: rgba(255,255,255,0.5); }
  .sheet-perm .chk{ width: 15px; height: 15px; border-radius: 4px; background: rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; font-size: 9px; color: transparent; transition: all 0.25s ease; }
  .sheet-perm.on{ color: #fff; }
  .sheet-perm.on .chk{ background: var(--personal); color: #06231A; }

  .floor{
    position:absolute; bottom: -40px; left:50%; transform: translateX(-50%);
    width: 480px; height: 90px;
    background: radial-gradient(ellipse at center, rgba(32,201,151,0.16), transparent 70%);
    opacity: 0; transition: opacity 0.6s ease; z-index: 1;
  }
  .floor.show{ opacity: 1; }

  .caption{
    position:absolute; bottom: 40px; left:0; right:0; text-align:center; z-index: 20;
    font-size: 13px; color: var(--text-faint); font-family:'IBM Plex Mono',monospace; letter-spacing: 0.08em;
  }

  @media (max-width: 480px){
    .phone-outer{ width: 300px; height: 380px; }
    .sheet{ width: 220px; }
  }
</style>
</head>
<body>

<div class="stage-wrap">
  <div class="grid-tunnel" id="tunnel"></div>

  <div class="stage float-anim" id="stage">
    <div class="capsule">
      <div class="dot"></div>
      <span id="capsuleText">Новый запрос доступа…</span>
    </div>

    <div class="floor" id="floor"></div>

    <div class="phone-outer">
      <div class="spline-box">
        <spline-viewer url="https://prod.spline.design/dSrYCDTvp621El9k/scene.splinecode" loading-anim></spline-viewer>
      </div>

      <div class="bubbles" id="bubbles" style="display:none;">
        <div class="bubble-in">Доступ открыт — можно писать и звонить</div>
        <div class="bubble-out">Отлично, на связи</div>
      </div>

      <div class="sheet" id="sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-top">
          <div class="sheet-avatar"></div>
          <div>
            <div class="sheet-name">Открыть доступ Алексу?</div>
            <div class="sheet-id">PAGER ID A147 0865</div>
          </div>
        </div>
        <div class="sheet-perms" id="sheetPerms">
          <div class="sheet-perm" data-p="0"><span>Текст</span><div class="chk">✓</div></div>
          <div class="sheet-perm" data-p="1"><span>Аудио</span><div class="chk">✓</div></div>
          <div class="sheet-perm" data-p="2"><span>Видео</span><div class="chk">✓</div></div>
        </div>
      </div>
    </div>
  </div>

  <div class="caption mono" id="caption">PAGER — доступ открывается на ваших глазах</div>
</div>

<script>
(function(){
  var stage = document.getElementById('stage');
  var tunnel = document.getElementById('tunnel');
  var capsuleText = document.getElementById('capsuleText');
  var sheet = document.getElementById('sheet');
  var sheetPerms = document.querySelectorAll('#sheetPerms .sheet-perm');
  var bubbles = document.getElementById('bubbles');
  var floor = document.getElementById('floor');

  function setCapsule(text){
    capsuleText.style.opacity = 0;
    setTimeout(function(){ capsuleText.textContent = text; capsuleText.style.opacity = 1; }, 180);
  }

  function resetPerms(){
    sheetPerms.forEach(function(p){ p.classList.remove('on'); });
  }

  function cascadePerms(cb){
    sheetPerms.forEach(function(p, i){
      setTimeout(function(){
        p.classList.add('on');
        if(i === sheetPerms.length - 1 && cb) setTimeout(cb, 350);
      }, i * 380 + 200);
    });
  }

  function runSequence(){
    // Scene A: idle float, capsule "new request"
    stage.classList.remove('pushed','resting');
    stage.classList.add('float-anim');
    sheet.classList.remove('up');
    bubbles.style.display = 'none';
    floor.classList.remove('show');
    resetPerms();
    setCapsule('Новый запрос доступа…');

    setTimeout(function(){
      // camera push in
      stage.classList.remove('float-anim');
      stage.classList.add('pushed');
      setCapsule('Открываем профиль…');
    }, 2000);

    setTimeout(function(){
      // sheet slides up
      sheet.classList.add('up');
      cascadePerms(function(){
        setCapsule('Права выданы ✓');
      });
    }, 3100);

    setTimeout(function(){
      // tunnel transition
      tunnel.classList.add('active');
    }, 6400);

    setTimeout(function(){
      // scene B: resting, chat open
      tunnel.classList.remove('active');
      stage.classList.remove('pushed');
      stage.classList.add('resting');
      sheet.classList.remove('up');
      bubbles.style.display = 'block';
      floor.classList.add('show');
      setCapsule('Доступ открыт');
    }, 7050);

    setTimeout(runSequence, 10500);
  }

  runSequence();
})();
</script>

</body>
</html>
